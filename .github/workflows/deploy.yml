name: Deploy CloudTrain Studio

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy-backend:
    name: Deploy AWS Serverless Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: SAM Build
        run: sam build --use-container

      - name: Shrink Lambda Package Size
        run: |
          echo "Original size:"
          du -sh .aws-sam/build/TrainingFunction || true
          find .aws-sam/build/ -name "*.so" -exec strip {} \; || true
          find .aws-sam/build/ -type d -name "tests" -exec rm -rf {} + || true
          find .aws-sam/build/ -type d -name "test" -exec rm -rf {} + || true
          find .aws-sam/build/ -type d -name "__pycache__" -exec rm -rf {} + || true
          find .aws-sam/build/ -name "*.pyc" -delete || true
          find .aws-sam/build/ -name "*.a" -delete || true
          echo "Shrunk size:"
          du -sh .aws-sam/build/TrainingFunction || true

      - name: SAM Deploy
        run: >
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset 
          --stack-name cloudtrain-studio-v3 
          --s3-prefix cloudtrain-studio-v3 
          --resolve-s3 
          --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM

  deploy-frontend:
    name: Build & Deploy React Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
